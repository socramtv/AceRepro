<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#1a1730"/>
      <stop offset="100%" stop-color="#07070d"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#9b8fff"/>
    </linearGradient>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5a0"/>
      <stop offset="100%" stop-color="#00c97a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip to rounded square for maskable -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGlow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e1e2e" stroke-width="1" opacity="0.6">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Signal arcs (broadcast motif) — behind icon -->
  <!-- Outer arc -->
  <path d="M 148 310 A 148 148 0 0 1 364 310"
        fill="none" stroke="url(#accentGrad)" stroke-width="14"
        stroke-linecap="round" opacity="0.35" filter="url(#glow)"/>
  <!-- Middle arc -->
  <path d="M 178 295 A 108 108 0 0 1 334 295"
        fill="none" stroke="url(#accentGrad)" stroke-width="14"
        stroke-linecap="round" opacity="0.55" filter="url(#glow)"/>
  <!-- Inner arc -->
  <path d="M 210 278 A 68 68 0 0 1 302 278"
        fill="none" stroke="url(#signalGrad)" stroke-width="14"
        stroke-linecap="round" opacity="0.85" filter="url(#glow-sm)"/>

  <!-- Rounded square badge (violet) -->
  <rect x="176" y="196" width="160" height="160" rx="32" ry="32"
        fill="url(#accentGrad)" filter="url(#glow)"/>

  <!-- Play triangle (green, inset) -->
  <polygon points="228,228 228,324 324,276"
           fill="url(#signalGrad)" filter="url(#glow-sm)"/>

  <!-- Bottom broadcast dot -->
  <circle cx="256" cy="336" r="10" fill="url(#signalGrad)" filter="url(#glow-sm)"/>

  <!-- "S" monogram subtle overlay in badge — top-right corner dot accent -->
  <circle cx="316" cy="212" r="7" fill="#00e5a0" opacity="0.9"/>
</svg>
