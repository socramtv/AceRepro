<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi IPTV & Ace Stream PlayerJS</title>
    
    <script src="playerjs.js" type="text/javascript"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f12;
            color: #f0f0f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
        }
        .player-container {
            width: 95%;
            max-width: 1000px;
            text-align: center;
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        h1 span {
            color: #00e676;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #787880;
            margin-bottom: 20px;
        }
        
        /* Contenedor Grid de Botones */
        .selector-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        .mode-btn {
            background-color: #1a1a22;
            border: 1px solid #2d2d37;
            color: #a0a0aa;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            transition: all 0.2s ease;
            flex: 1 1 calc(16% - 10px);
            min-width: 140px;
            max-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .mode-btn:hover {
            border-color: #00e676;
            color: #fff;
        }
        .mode-btn.active {
            background-color: #00e676;
            color: #0f0f12;
            border-color: #00e676;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.35);
        }

        /* Zona de carga M3U local */
        .upload-box {
            background-color: #1a1a22;
            border: 2px dashed #2d2d37;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            transition: border-color 0.2s;
        }
        .upload-box:hover {
            border-color: #00e676;
        }
        .upload-box label {
            display: block;
            font-size: 0.9rem;
            color: #00e676;
            cursor: pointer;
            font-weight: 600;
        }
        .upload-box input[type="file"] {
            display: none;
        }

        /* Contenedor del reproductor */
        .video-box {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #23232a;
            aspect-ratio: 16 / 9;
        }
        #player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h1>Ace Stream & IPTV <span>Entertainment Hub</span></h1>
    <div class="subtitle" id="lista-status">Cargando canales predeterminados...</div>
    
    <div class="selector-container">
        <button id="btn-acestream" class="mode-btn active">⚡ Ace Stream</button>
        <button id="btn-tdt" class="mode-btn">📺 TDT Channels</button>
        <button id="btn-pluto" class="mode-btn">🪐 Pluto TV</button>
        <button id="btn-runtime" class="mode-btn">🎬 Runtime TV</button>
        <button id="btn-rakuten" class="mode-btn">🔴 Rakuten TV</button>
        <button id="btn-canela" class="mode-btn">🌶️ Canela TV</button>
    </div>

    <div class="upload-box">
        <label for="m3u-file">📂 O importar lista propia .m3u / .m3u8 (Local)</label>
        <input type="file" id="m3u-file" accept=".m3u,.m3u8">
    </div>

    <div class="video-box">
        <div id="player"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Elementos del DOM
        const btnAce = document.getElementById('btn-acestream');
        const btnTdt = document.getElementById('btn-tdt');
        const btnPluto = document.getElementById('btn-pluto');
        const btnRuntime = document.getElementById('btn-runtime');
        const btnRakuten = document.getElementById('btn-rakuten');
        const btnCanela = document.getElementById('btn-canela');
        const fileInput = document.getElementById('m3u-file');
        const statusTxt = document.getElementById('lista-status');
        
        const todosLosBotones = [btnAce, btnTdt, btnPluto, btnRuntime, btnRakuten, btnCanela];
        let playerInstance = null;

        // Variables de almacenamiento caché para las listas online
        const cacheListas = {
            tdt: null,
            pluto: null,
            runtime: null,
            rakuten: null,
            canela: null
        };

        // URLs oficiales de las listas externas
        const urlsListas = {
            tdt: "https://www.tdtchannels.com/lists/tv.m3u",
            pluto: "https://www.dropbox.com/scl/fi/bvdf176n0wgg5xwhanje1/TV-Pluto-TV.m3u?rlkey=rrsko8vnqlyv339w3nhkuvzrn&st=j9b2jb7b&dl=1",
            runtime: "https://www.dropbox.com/scl/fi/tvebcwp66p20sferbmqt7/TV-RuntimeTV.m3u?rlkey=ss4ecanytbjfghkdjydteuo88&st=3yug6776&dl=1",
            rakuten: "https://www.dropbox.com/scl/fi/6a5it8p75v8p1ddrfkobw/TV-Rakuten-TV.m3u?rlkey=pbdb0laz2pkvoduu37tylkpjk&st=tmq1tnw0&dl=1",
            canela: "https://www.dropbox.com/scl/fi/czj32qifwvneqnitwtj58/TV-CanelaTV.m3u?rlkey=3kakbt9ap0sm2lb2i6qyiclyz&st=wqi2nep8&dl=1"
        };

        // LISTA INTERNA DE ACE STREAM RESTAURADA POR COMPLETO
        const canalesAceStream = [
            {
                "title": "BALONCESTO",
                "folder": [
                    {"title": "DAZN Baloncesto 720p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=9dd9cd78f0b08097a0ad290606dbbee999709fa5"},
                    {"title": "DAZN Baloncesto 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=6fbd92735502bdebbf1ea58f4298e49759c0cf07"}
                ]
            },
            {
                "title": "EUROSPORT",
                "folder": [
                    {"title": "Eurosport 1 720p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=313213b3b99c0f7437f68c8ea5a7b2b6d7b8a153"},
                    {"title": "Eurosport 1 1080p *", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=48a589dbeab3544662fafd79888aada7d834cfe9"},
                    {"title": "Eurosport 1 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=8522af51ae7189b12effabbb448dcb707195ce1a"}
                ]
            },
            {
                "title": "HYPERMOTION",
                "folder": [
                    {"title": "LaLiga TV Hypermotion 720p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=2c54a4def58f41fc0d2163450a63f12955b656aa"}
                ]
            },
            {
                "title": "LIGA DE CAMPEONES",
                "folder": [
                    {"title": "M+ Liga de Campeones 720p *", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=63e4713e8379f2ebf5e6ed9aa00fbf78ebae7439"},
                    {"title": "M+ Liga de Campeones 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=91af434b0bb521189286f8cbbab1aed39d7536fe"}
                ]
            },
            {
                "title": "MOVISTAR",
                "folder": [
                    {"title": "MOVISTAR PLUS 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=1ab443f5b4beb6d586f19e8b25b9f9646cf2ab78"}
                ]
            },
            {
                "title": "MOVISTAR DEPORTES",
                "folder": [
                    {"title": "M+ Golf 1080p *", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=9bb2a7dc6c6a296609df8cc50e742a78194f7530"},
                    {"title": "M+ Vamos 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=7e4f6eb38e0d5ef52b7f8b96eb80c1d8c87dad16"},
                    {"title": "M+ VAMOS 3 1080p * (Opción 1)", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=a9299052e9a16e5e2924e1fdd00b877c374f9e96"},
                    {"title": "M+ VAMOS 3 1080p * (Opción 2)", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=b46a524780cf0ac5e533491fe79389d6198acf2c"}
                ]
            },
            {
                "title": "TDT",
                "folder": [
                    {"title": "La 1 TVE ** (Opción 1)", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=379192c3ee5a15570e2c685179bc53cb7133cc6c"},
                    {"title": "La 1 TVE ** (Opción 2)", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=979d3b873871a5a9a56d3eb481ca77b707e01102"},
                    {"title": "La 2 TVE 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=b80cd193286a7df788c07649667c1e6f64fc9dc7"}
                ]
            },
            {
                "title": "DEPORTES",
                "folder": [
                    {"title": "Direct Sport 1 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=1b25b195b1b84d4b96830410657718e9e275ad49"},
                    {"title": "Esport3 720p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=ed6524f8f73c30cf102fde66f2cb520f4b5842e3"},
                    {"title": "Teledeporte 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=77cf022557c56cdf8d8115f50e61f846ad72ee05"},
                    {"title": "TV5Monde Europe *", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=59f2d0e15869d73f19d7ac441d5aedffb6c4ebb8"}
                ]
            },
            {
                "title": "MUNDIAL",
                "folder": [
                    {"title": "Dazn Mundial 1 *", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=ccfde4bc75d14c79dd09af72434568a0e732d507"},
                    {"title": "Dazn Mundial 1 **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=414222dc7b69a626f29eb964450dae44b3bc9b36"}
                ]
            },
            {
                "title": "TENNIS",
                "folder": [
                    {"title": "Tennis Channel 1080p **", "file": "http://127.0.0.1:6878/ace/manifest.m3u8?id=43c549e5781f5a923b76f8f29cde122b5be164eb"}
                ]
            }
        ];

        // Función base para inyectar listas en PlayerJS
        function cargarListaEnPlayer(listaCanales) {
            if (typeof Playerjs === "undefined") {
                statusTxt.textContent = "Error: No se encuentra 'playerjs.js' en la carpeta.";
                return;
            }

            if (playerInstance) {
                playerInstance.api("file", listaCanales);
            } else {
                playerInstance = new Playerjs({
                    id: "player",
                    file: listaCanales,
                    autoplay: 1
                });
            }
        }

        // Función genérica e inteligente de descarga online libre de bloqueos CORS
        async function gestionarCargaOnline(clave, nombreVisible, botonElemento) {
            // Cambiar estados visuales de los botones
            todosLosBotones.forEach(btn => btn.classList.remove('active'));
            botonElemento.classList.add('active');
            fileInput.value = ""; // Resetear input de archivo local

            // Si ya la habíamos descargado antes, usar la caché instantáneamente
            if (cacheListas[clave]) {
                statusTxt.textContent = `📺 Mostrando canales de ${nombreVisible} (Caché).`;
                cargarListaEnPlayer(cacheListas[clave]);
                return;
            }

            statusTxt.textContent = `📥 Descargando y procesando la lista de ${nombreVisible}...`;
            try {
                const urlConProxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(urlsListas[clave])}`;
                const respuesta = await fetch(urlConProxy);
                if (!respuesta.ok) throw new Error("Status " + respuesta.status);
                
                const textoM3u = await respuesta.text();
                const listaFormateada = convertirM3UaPlayerJS(textoM3u);
                
                if (listaFormateada.length > 0) {
                    cacheListas[clave] = listaFormateada; // Guardar en caché
                    cargarListaEnPlayer(listaFormateada);
                    statusTxt.textContent = `📺 Lista de ${nombreVisible} cargada correctamente de internet.`;
                } else {
                    throw new Error("La lista procesada está vacía.");
                }
            } catch (error) {
                console.error(error);
                statusTxt.textContent = `❌ Error al conectar con la lista de ${nombreVisible}.`;
                alert(`No se pudo descargar la lista de ${nombreVisible}. Revisa tu conexión.`);
                btnAce.click(); // Regresar a Ace Stream por seguridad
            }
        }

        // Manejador del lector de archivos locales .m3u subidos a mano
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            todosLosBotones.forEach(btn => btn.classList.remove('active'));

            const reader = new FileReader();
            reader.onload = (event) => {
                const listaFormateada = convertirM3UaPlayerJS(event.target.result);
                if (listaFormateada.length > 0) {
                    cargarListaEnPlayer(listaFormateada);
                    statusTxt.textContent = `📂 Archivo local: ${file.name} (${listaFormateada.length} carpetas generadas)`;
                } else {
                    alert("El archivo no contiene canales válidos estructurados.");
                    btnAce.click();
                }
            };
            reader.readAsText(file);
        });

        // Convertidor Universal M3U a Formato Estructurado de Carpetas PlayerJS
        function convertirM3UaPlayerJS(rawText) {
            const lineas = rawText.split(/\r?\n/);
            const mapaGrupos = {};
            let canalTemporal = null;

            for (let i = 0; i < lineas.length; i++) {
                let linea = lineas[i].trim();

                if (linea.startsWith('#EXTINF:')) {
                    canalTemporal = {};
                    const grupoMatch = linea.match(/group-title="([^"]+)"/i);
                    canalTemporal.grupo = grupoMatch ? grupoMatch[1].toUpperCase() : 'CANALES GENERALES';
                    
                    const comaIndex = linea.lastIndexOf(',');
                    canalTemporal.title = comaIndex !== -1 ? linea.substring(comaIndex + 1).trim() : 'Canal Directo';
                } 
                else if (linea && !linea.startsWith('#')) {
                    if (canalTemporal) {
                        let url = linea;

                        // Auto-detección y formateo de hashes y links locales de Ace Stream
                        if (url.startsWith('acestream://')) {
                            const id = url.replace('acestream://', '').trim();
                            url = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${id}`;
                        } else if (/^[a-fA-F0-9]{40}$/.test(url)) {
                            url = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${url}`;
                        } else if (url.includes('id=') && (url.includes('6878') || url.includes('/ace/'))) {
                            const matchId = url.match(/[?&]id=([^&]+)/);
                            if (matchId) url = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${matchId[1]}`;
                        }

                        canalTemporal.file = url;

                        if (!mapaGrupos[canalTemporal.grupo]) mapaGrupos[canalTemporal.grupo] = [];
                        mapaGrupos[canalTemporal.grupo].push({
                            "title": canalTemporal.title,
                            "file": canalTemporal.file
                        });

                        canalTemporal = null;
                    }
                }
            }

            return Object.keys(mapaGrupos).map(nombreGrupo => ({
                "title": nombreGrupo,
                "folder": mapaGrupos[nombreGrupo]
            }));
        }

        // EVENTOS CLICKS EN BOTONES DEL REPRODUCTOR
        btnAce.addEventListener('click', () => {
            todosLosBotones.forEach(btn => btn.classList.remove('active'));
            btnAce.classList.add('active');
            fileInput.value = "";
            statusTxt.textContent = "⚡ Canales de Ace Stream activos (Requiere motor local encendido).";
            cargarListaEnPlayer(canalesAceStream);
        });

        btnTdt.addEventListener('click', () => gestionarCargaOnline('tdt', 'TDT Channels', btnTdt));
        btnPluto.addEventListener('click', () => gestionarCargaOnline('pluto', 'Pluto TV', btnPluto));
        btnRuntime.addEventListener('click', () => gestionarCargaOnline('runtime', 'Runtime TV', btnRuntime));
        btnRakuten.addEventListener('click', () => gestionarCargaOnline('rakuten', 'Rakuten TV', btnRakuten));
        btnCanela.addEventListener('click', () => gestionarCargaOnline('canela', 'Canela TV', btnCanela));

        // Carga inicial automática con tus canales internos de Ace Stream
        setTimeout(() => {
            statusTxt.textContent = "⚡ Canales de Ace Stream activos (Requiere motor local encendido).";
            cargarListaEnPlayer(canalesAceStream);
        }, 150);
    });
</script>

</body>
</html>
